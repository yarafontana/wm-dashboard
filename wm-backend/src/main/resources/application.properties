spring.application.name=wm-dashboard-backend
server.port=8080

# ===== H2 In-Memory-Datenbank =====
spring.datasource.url=jdbc:h2:mem:wmdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2-Konsole erreichbar unter http://localhost:8080/h2-console
spring.h2.console.enabled=true

# ===== JPA / Hibernate =====
# validate: Hibernate erzeugt das Schema NICHT, sondern prÜft die Entities
# nur gegen das vorhandene Schema (schema.sql).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== SQL-Initialisierung =====
# schema.sql legt die Tabellen an, data.sql fÜllt die Seed-Daten.
spring.sql.init.mode=always
# schema.sql runs before JPA by default (Spring Boot 2.5+), so validate
# sees the already created tables. Do NOT set defer-datasource-initialization=true
# as that would run schema.sql AFTER Hibernate validation, causing "missing table".
